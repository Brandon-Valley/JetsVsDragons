<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jets vs Dragons</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #05080d;
    color: #f4efe2;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #boot {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    box-sizing: border-box;
    padding: 24px;
    text-align: center;
    background: radial-gradient(circle at 50% 28%, #1a3443, #05080d 68%);
  }
  #boot h1 {
    margin: 0;
    font-size: clamp(34px, 9vw, 72px);
    line-height: 0.92;
    letter-spacing: -0.06em;
    text-transform: uppercase;
  }
  #status {
    margin: 18px auto 0;
    max-width: 620px;
    opacity: 0.76;
    font-weight: 800;
    line-height: 1.45;
  }
  #retry {
    display: none;
    margin: 20px auto 0;
    border: 1px solid rgba(119, 212, 255, 0.7);
    border-radius: 6px;
    padding: 14px 24px;
    color: #f4efe2;
    background: #102b38;
    font: inherit;
    font-weight: 900;
    text-transform: uppercase;
  }
  #gameFrame {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: #05080d;
  }
</style>
</head>
<body>
<div id="boot">
  <div>
    <h1>Jets vs Dragons</h1>
    <div id="status">Loading combat systems...</div>
    <button id="retry" type="button">Retry</button>
  </div>
</div>
<script type="module">
  import { patchGame } from './patch_game.js?v=2';

  const BASE_COMMIT = '4fbf477e95573b7956754988a63ce40204a3576e';
  const statusEl = document.getElementById('status');
  const retryBtn = document.getElementById('retry');

  function decodeBase64Utf8(value) {
    const clean = value.replace(/\s/g, '');
    const binary = atob(clean);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  async function fetchBaseGame() {
    const apiUrl = 'https://api.github.com/repos/Brandon-Valley/JetsVsDragons/contents/index.html?ref=' + BASE_COMMIT;
    try {
      const response = await fetch(apiUrl, {
        cache: 'no-store',
        headers: { Accept: 'application/vnd.github+json' }
      });
      if (!response.ok) throw new Error('GitHub API returned ' + response.status);
      const data = await response.json();
      if (!data || data.encoding !== 'base64' || !data.content) throw new Error('GitHub API returned invalid file data');
      return decodeBase64Utf8(data.content);
    } catch (apiError) {
      const fallbackUrls = [
        'https://cdn.jsdelivr.net/gh/Brandon-Valley/JetsVsDragons@' + BASE_COMMIT + '/index.html',
        'https://raw.githubusercontent.com/Brandon-Valley/JetsVsDragons/' + BASE_COMMIT + '/index.html'
      ];
      let lastError = apiError;
      for (const url of fallbackUrls) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) throw new Error('Fallback returned ' + response.status);
          return await response.text();
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError;
    }
  }

  async function launch() {
    retryBtn.style.display = 'none';
    statusEl.textContent = 'Loading combat systems...';

    try {
      const source = await fetchBaseGame();
      statusEl.textContent = 'Applying flight systems...';
      const patched = patchGame(source);

      const frame = document.createElement('iframe');
      frame.id = 'gameFrame';
      frame.title = 'Jets vs Dragons game';
      frame.allow = 'autoplay; fullscreen';
      document.body.appendChild(frame);

      const frameDocument = frame.contentWindow.document;
      frameDocument.open();
      frameDocument.write(patched);
      frameDocument.close();

      document.getElementById('boot').remove();
    } catch (error) {
      console.error(error);
      statusEl.textContent = 'The game could not launch: ' + (error && error.message ? error.message : String(error));
      retryBtn.style.display = 'inline-block';
    }
  }

  retryBtn.addEventListener('click', launch);
  launch();
</script>
</body>
</html>
