name: Add aircraft game music

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/add-aircraft-music.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Add and validate the aircraft playlist
        shell: bash
        run: |
          cat > /tmp/patch_index.py <<'PY'
          from pathlib import Path
          from textwrap import dedent

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '// AIRCRAFT_MUSIC_PLAYLIST_V1'


          def replace_once(old, new, label):
              global text
              if old not in text:
                  raise SystemExit(f'Missing patch anchor: {label}')
              text = text.replace(old, new, 1)


          if marker in text:
              print('Aircraft music is already installed.')
          else:
              replace_once(
                  '  #pauseScreen, #gameOverScreen { display: none; }',
                  dedent('''\
                    #musicPlayer {
                      position: fixed;
                      width: 1px;
                      height: 1px;
                      left: -9999px;
                      top: -9999px;
                      opacity: 0;
                      pointer-events: none;
                      border: 0;
                    }
                    #musicNowPlaying {
                      margin: -7px auto 14px;
                      max-width: 520px;
                      color: rgba(244, 239, 226, 0.74);
                      font-size: 12px;
                      font-weight: 800;
                      letter-spacing: 0.035em;
                      line-height: 1.35;
                    }
                    #pauseScreen, #gameOverScreen { display: none; }'''),
                  'music styles'
              )

              replace_once(
                  '</script>\n</head>',
                  '</script>\n<script src="https://w.soundcloud.com/player/api.js"></script>\n</head>',
                  'SoundCloud API script'
              )

              replace_once(
                  '<canvas id="game"></canvas>\n',
                  '<canvas id="game"></canvas>\n<iframe id="musicPlayer" title="Aircraft game music" allow="autoplay"></iframe>\n',
                  'hidden music player'
              )

              replace_once(
                  '    <p class="subtitle">Resume this run or return to the main menu.</p>\n    <div class="menuActions">\n      <button id="resumeBtn" class="secondaryBtn">Resume</button>\n      <button id="restartPauseBtn">Main Menu</button>\n    </div>',
                  '    <p class="subtitle">Resume this run or return to the main menu.</p>\n    <div id="musicNowPlaying">Aircraft soundtrack will begin when the mission starts.</div>\n    <div class="menuActions">\n      <button id="resumeBtn" class="secondaryBtn">Resume</button>\n      <button id="musicToggleBtn" class="secondaryBtn">Music: On</button>\n      <button id="musicNextBtn">Next Song</button>\n      <button id="restartPauseBtn">Main Menu</button>\n    </div>',
                  'pause menu music controls'
              )

              replace_once(
                  "const INTERNET_SFX_ZIP_URLS = [INTERNET_SFX_ZIP_URL, 'https://api.allorigins.win/raw?url=' + encodeURIComponent(INTERNET_SFX_ZIP_URL)];\n",
                  dedent("""\
                  const INTERNET_SFX_ZIP_URLS = [INTERNET_SFX_ZIP_URL, 'https://api.allorigins.win/raw?url=' + encodeURIComponent(INTERNET_SFX_ZIP_URL)];

                  // AIRCRAFT_MUSIC_PLAYLIST_V1
                  const GAME_MUSIC_TRACKS = [
                    { aircraft: 'F-16', title: 'How to Start an F-16', soundcloud: 'https://soundcloud.com/landon-blake-641292926/how-to-start-an-f-16-bully-in' },
                    { aircraft: 'F-14', title: 'How to Start the F-14 Tomcat', soundcloud: 'https://soundcloud.com/landon-blake-641292926/how-to-start-the-f-14-tomcat' },
                    { aircraft: 'F-16', title: 'How to Land an F-16', soundcloud: 'https://soundcloud.com/landon-blake-641292926/how-to-land-an-f-16-mary-ellen' },
                    { aircraft: 'AH-64', title: 'How to Fly an Apache', soundcloud: 'https://soundcloud.com/landon-blake-641292926/how-to-fly-an-apache-attack' },
                    { aircraft: 'A-10', title: 'How to Start an A-10', soundcloud: 'https://soundcloud.com/landon-blake-641292926/how-to-start-an-a-10-song' },
                    { aircraft: 'F-16', title: 'Eject! Eject! F-16', soundcloud: 'https://soundcloud.com/landon-blake-641292926/eject-eject-f-16-a-well-roll' },
                    { aircraft: 'F-22', title: 'How to Start the F-22', soundcloud: 'https://soundcloud.com/landon-blake-641292926/how-to-start-the-f-22-song-128' },
                    { aircraft: 'A-10', title: 'How to Arm and Fire the A-10', soundcloud: 'https://soundcloud.com/landon-blake-641292926/how-to-arm-and-fire-a-10-song' }
                  ];
                  const GAME_MUSIC_VOLUME = 30;
                  """),
                  'aircraft playlist data'
              )

              replace_once(
                  "const pauseBtn = document.getElementById('pauseBtn');\n",
                  dedent("""\
                  const pauseBtn = document.getElementById('pauseBtn');
                  const musicPlayer = document.getElementById('musicPlayer');
                  const musicToggleBtn = document.getElementById('musicToggleBtn');
                  const musicNextBtn = document.getElementById('musicNextBtn');
                  const musicNowPlaying = document.getElementById('musicNowPlaying');
                  """),
                  'music DOM references'
              )

              replace_once(
                  'let audioCtx = null;\n',
                  dedent("""\
                  let audioCtx = null;
                  let musicWidget = null;
                  let musicReady = false;
                  let musicShouldPlay = false;
                  let musicTrackIndex = Math.floor(Math.random() * GAME_MUSIC_TRACKS.length);
                  let musicEnabled = true;
                  try { musicEnabled = localStorage.getItem('jetsVsDragonsMusicEnabled') !== 'false'; } catch (e) {}
                  """),
                  'music state'
              )

              replace_once(
                  '  setupControls();\n  animate(0);',
                  '  setupControls();\n  initGameMusic();\n  animate(0);',
                  'music initialization'
              )

              replace_once(
                  "  controls.classList.add('hidden');\n  clearTargetMarkers();\n}",
                  "  controls.classList.add('hidden');\n  stopGameMusic();\n  clearTargetMarkers();\n}",
                  'stop music at main menu'
              )

              replace_once(
                  "  initAudio();\n  if (mode === 'target') loadTargetBest();",
                  "  initAudio();\n  startGameMusic();\n  if (mode === 'target') loadTargetBest();",
                  'start music with a mission'
              )

              replace_once(
                  "  pauseBtn.addEventListener('click', togglePause);\n",
                  dedent("""\
                    pauseBtn.addEventListener('click', togglePause);
                    if (musicToggleBtn) musicToggleBtn.addEventListener('click', toggleGameMusic);
                    if (musicNextBtn) musicNextBtn.addEventListener('click', () => nextGameMusic(true));
                  """),
                  'music controls events'
              )

              music_functions = dedent(r'''
              function soundCloudPlayerUrl(trackUrl) {
                return 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(trackUrl)
                  + '&auto_play=false&buying=false&download=false&sharing=false'
                  + '&show_artwork=false&show_comments=false&show_playcount=false'
                  + '&show_user=false&show_reposts=false&visual=false&hide_related=true';
              }

              function currentMusicTrack() {
                return GAME_MUSIC_TRACKS[musicTrackIndex] || GAME_MUSIC_TRACKS[0];
              }

              function updateMusicUi(statusText = '') {
                const track = currentMusicTrack();
                if (musicToggleBtn) musicToggleBtn.textContent = musicEnabled ? 'Music: On' : 'Music: Off';
                if (musicNextBtn) musicNextBtn.disabled = !musicReady;
                if (!musicNowPlaying) return;
                if (!musicEnabled) {
                  musicNowPlaying.textContent = 'Music is off.';
                } else if (statusText) {
                  musicNowPlaying.textContent = statusText;
                } else if (track) {
                  musicNowPlaying.textContent = 'Now playing: ' + track.aircraft + ' - ' + track.title;
                }
              }

              function initGameMusic() {
                if (!musicPlayer || GAME_MUSIC_TRACKS.length === 0) return;
                musicPlayer.src = soundCloudPlayerUrl(currentMusicTrack().soundcloud);
                updateMusicUi('Aircraft soundtrack is loading...');

                let attempts = 0;
                const connectWidget = () => {
                  attempts += 1;
                  if (!window.SC || !window.SC.Widget) {
                    if (attempts < 100) setTimeout(connectWidget, 100);
                    else updateMusicUi('Aircraft soundtrack could not load.');
                    return;
                  }

                  try {
                    musicWidget = window.SC.Widget(musicPlayer);
                    const events = window.SC.Widget.Events;
                    musicWidget.bind(events.READY, () => {
                      musicReady = true;
                      musicWidget.setVolume(GAME_MUSIC_VOLUME);
                      updateMusicUi();
                      if (musicShouldPlay && musicEnabled) musicWidget.play();
                    });
                    musicWidget.bind(events.PLAY, () => updateMusicUi());
                    musicWidget.bind(events.FINISH, () => nextGameMusic(true));
                    if (events.ERROR) {
                      musicWidget.bind(events.ERROR, () => {
                        updateMusicUi('Skipping an unavailable song...');
                        setTimeout(() => nextGameMusic(true), 700);
                      });
                    }
                  } catch (e) {
                    musicWidget = null;
                    updateMusicUi('Aircraft soundtrack could not load.');
                  }
                };
                connectWidget();

                document.addEventListener('visibilitychange', () => {
                  if (!musicWidget || !musicReady || !musicEnabled) return;
                  if (document.hidden) musicWidget.pause();
                  else if (musicShouldPlay) musicWidget.play();
                });
              }

              function loadCurrentMusicTrack(shouldPlay) {
                const track = currentMusicTrack();
                if (!track) return;
                updateMusicUi('Loading: ' + track.aircraft + ' - ' + track.title);
                if (!musicWidget || !musicReady) {
                  if (musicPlayer) musicPlayer.src = soundCloudPlayerUrl(track.soundcloud);
                  return;
                }
                try {
                  musicWidget.load(track.soundcloud, {
                    auto_play: !!(shouldPlay && musicEnabled),
                    buying: false,
                    download: false,
                    sharing: false,
                    show_artwork: false,
                    show_comments: false,
                    show_playcount: false,
                    show_user: false,
                    show_reposts: false,
                    visual: false,
                    hide_related: true,
                    callback: () => {
                      musicWidget.setVolume(GAME_MUSIC_VOLUME);
                      updateMusicUi();
                      if (shouldPlay && musicEnabled) musicWidget.play();
                    }
                  });
                } catch (e) {
                  updateMusicUi('Skipping an unavailable song...');
                  setTimeout(() => nextGameMusic(shouldPlay), 700);
                }
              }

              function startGameMusic() {
                musicShouldPlay = true;
                updateMusicUi();
                if (!musicEnabled || !musicWidget || !musicReady) return;
                try {
                  musicWidget.setVolume(GAME_MUSIC_VOLUME);
                  musicWidget.play();
                } catch (e) {}
              }

              function stopGameMusic() {
                musicShouldPlay = false;
                if (!musicWidget || !musicReady) return;
                try { musicWidget.pause(); } catch (e) {}
              }

              function toggleGameMusic() {
                musicEnabled = !musicEnabled;
                try { localStorage.setItem('jetsVsDragonsMusicEnabled', String(musicEnabled)); } catch (e) {}
                updateMusicUi();
                if (!musicWidget || !musicReady) return;
                try {
                  if (musicEnabled && musicShouldPlay) {
                    musicWidget.setVolume(GAME_MUSIC_VOLUME);
                    musicWidget.play();
                  } else {
                    musicWidget.pause();
                  }
                } catch (e) {}
              }

              function nextGameMusic(forcePlay = musicShouldPlay) {
                if (GAME_MUSIC_TRACKS.length === 0) return;
                musicTrackIndex = (musicTrackIndex + 1) % GAME_MUSIC_TRACKS.length;
                loadCurrentMusicTrack(forcePlay && musicEnabled);
              }

              ''')

              replace_once(
                  'function initAudio() {',
                  music_functions + 'function initAudio() {',
                  'music functions'
              )

              path.write_text(text, encoding='utf-8')
              print('Added 8-track aircraft music playlist to index.html.')

          updated = path.read_text(encoding='utf-8')
          checks = {
              'playlist marker': marker in updated,
              'all eight tracks': updated.count("soundcloud: 'https://soundcloud.com/landon-blake-641292926/") == 8,
              'SoundCloud widget API': 'https://w.soundcloud.com/player/api.js' in updated,
              'music toggle': 'id="musicToggleBtn"' in updated,
              'next song': 'id="musicNextBtn"' in updated,
              'automatic advance': 'events.FINISH' in updated,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit('Validation failed: ' + ', '.join(failed))
          print('Validation passed: ' + ', '.join(checks))
          PY
          python3 /tmp/patch_index.py
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          modules = re.findall(r'<script type="module">(.*?)</script>', html, flags=re.S)
          if len(modules) != 1:
              raise SystemExit(f'Expected one module script, found {len(modules)}')
          Path('/tmp/jets-vs-dragons-check.mjs').write_text(modules[0], encoding='utf-8')
          PY
          node --check /tmp/jets-vs-dragons-check.mjs

      - name: Commit directly to master
        shell: bash
        run: |
          rm -f .github/workflows/add-aircraft-music.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-aircraft-music.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Add aircraft playlist as game music"
          git pull --rebase origin master
          git push origin master
