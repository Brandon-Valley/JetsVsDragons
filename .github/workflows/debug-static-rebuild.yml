name: Debug static game rebuild

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  debug:
    if: github.event.pull_request.title == 'Debug static JetsVsDragons rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Check source anchors
        shell: bash
        run: |
          git show 4fbf477e95573b7956754988a63ce40204a3576e:index.html > /tmp/base-index.html
          python3 - <<'PY'
          from pathlib import Path
          text = Path('/tmp/base-index.html').read_text()
          checks = {
            'death sequence state': "let musicEnabled = true;\ntry { musicEnabled = localStorage.getItem('jetsVsDragonsMusicEnabled') !== 'false'; } catch (e) {}\nlet internetSfxPromise = null;",
            'pause and resume music': "function pauseGame() {\n  playGameSound('ui', 0.35, 360, 0.05, 'triangle', 0.04);\n  paused = true;\n  if (missileBtn) missileBtn.classList.remove('armed');\n  pauseScreen.classList.add('visible');\n}\nfunction resumeGame() {\n  playGameSound('ui', 0.35, 520, 0.05, 'triangle', 0.04);\n  paused = false;\n  pauseScreen.classList.remove('visible');\n  if (clock) clock.getDelta();\n}",
            'death sequence animation loop': "  if (running && !paused && !gameOver && player) update(dt || 0.016);",
            'player mountain behavior': "  const playerMountainRadius = playerIsDragon() ? clamp(6.2 + getDragonScale(player) * 0.42, 7.0, 11.5) : 5.8;",
            'player jet death dispatch': "  if (player.health <= 0) endGame();",
            'music pause helpers': "function stopGameMusic() {\n  musicShouldPlay = false;\n  if (!musicWidget || !musicReady) return;\n  try { musicWidget.pause(); } catch (e) {}\n}",
            'visibility music guard': "    else if (musicShouldPlay) musicWidget.play();",
            'ready music guard': "        if (musicShouldPlay && musicEnabled) musicWidget.play();",
            'loaded music guard': "        if (shouldPlay && musicEnabled) musicWidget.play();",
            'toggle music guard': "    if (musicEnabled && musicShouldPlay) {",
            'next track guard': "  loadCurrentMusicTrack(forcePlay && musicEnabled);",
            'enemy jet mountain crash': "  d.speed = lerp(d.speed, dist < 130 ? 160 : 122 + wave * 3, dt * 0.55);",
            'enemy dragon mountain bounce': "  const sizeT = clamp((displayScale - DRAGON_MIN_DISPLAY_SCALE) / (DRAGON_MAX_DISPLAY_SCALE - DRAGON_MIN_DISPLAY_SCALE), 0, 1);",
            'death sequence functions': "function completeTargetMode() {",
            'target completion music': "  gameOver = true;\n  running = false;\n  const oldBest = targetBest;",
            'death music': "function endGame() {\n  gameOver = true;\n  running = false;",
          }
          lines = [f"{label}: {'FOUND' if value in text else 'MISSING'}" for label, value in checks.items()]
          Path('static-build-debug.txt').write_text('\n'.join(lines) + '\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add static-build-debug.txt
          git commit -m "Capture static rebuild diagnostics"
          git pull --rebase origin master
          git push origin master
