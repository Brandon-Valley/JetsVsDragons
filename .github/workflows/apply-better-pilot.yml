name: Apply improved pilot model

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.title == 'Apply improved JetsVsDragons pilot'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Update complete static index
        run: |
          node --check apply_better_pilot.mjs
          node apply_better_pilot.mjs

      - name: Validate game source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script type="module">(.*?)</script>', html, flags=re.S)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          required = [
              'BETTER_PILOT_ASSET_V1',
              'Soldier.glb',
              'function preparePilotCharacter(root)',
              'pilotMixer.update(dt)',
              "ejectionSeat.visible = false",
          ]
          for value in required:
              if value not in html:
                  raise SystemExit('Missing improved pilot feature: ' + value)
          forbidden = ['Pilot ejected safely', 'patchGame(', 'fetchBaseGame(', 'gameFrame']
          for value in forbidden:
              if value in html:
                  raise SystemExit('Forbidden old code remains: ' + value)
          Path('/tmp/game-check.mjs').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/game-check.mjs

      - name: Commit finished index directly to master
        run: |
          rm -f apply_better_pilot.mjs pilot-update-trigger.txt
          rm -f .github/workflows/apply-better-pilot.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use animated 3D pilot character"
          git pull --rebase origin master
          git push origin master
