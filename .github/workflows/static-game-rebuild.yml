name: Static game rebuild

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  rebuild:
    if: github.event.pull_request.title == 'Trigger static JetsVsDragons rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Build complete static index
        shell: bash
        run: |
          git show 4fbf477e95573b7956754988a63ce40204a3576e:index.html > index.html
          echo '' | base64 -d | gunzip > /tmp/apply-static-patch.mjs
          node /tmp/apply-static-patch.mjs

      - name: Validate complete game
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script type="module">(.*?)</script>', html, flags=re.S)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          if 'patchGame(' in html or 'fetchBaseGame(' in html or 'gameFrame' in html:
              raise SystemExit('Runtime loader still present')
          Path('/tmp/game-check.mjs').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/game-check.mjs
          grep -q 'JET_EJECTION_STATIC_V3' index.html
          grep -q 'Dragon bounced off mountain' index.html
          grep -q 'Enemy Jet Crashed' index.html

      - name: Commit finished index directly to master
        shell: bash
        run: |
          rm -f .github/workflows/static-game-rebuild.yml patch_game.js apply_jet_crash_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace index with static jet crash update"
          git pull --rebase origin master
          git push origin master
