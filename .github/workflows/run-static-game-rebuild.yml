name: Run final static game rebuild

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  rebuild:
    if: github.event.pull_request.title == 'Run final static JetsVsDragons rebuild'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Build complete static index
        run: |
          git show 4fbf477e95573b7956754988a63ce40204a3576e:index.html > index.html
          node apply_static_patch.mjs

      - name: Validate complete game
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script type="module">(.*?)</script>', html, flags=re.S)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          forbidden = ['patchGame(', 'fetchBaseGame(', 'gameFrame', 'Loading combat systems...']
          for value in forbidden:
              if value in html:
                  raise SystemExit('Runtime loader still present: ' + value)
          required = ['JET_EJECTION_STATIC_V3', 'Dragon bounced off mountain', 'Enemy Jet Crashed', 'function createEjectedPilot()', 'function openEjectionParachute(sequence)', 'pauseGameMusic();']
          for value in required:
              if value not in html:
                  raise SystemExit('Missing required static feature: ' + value)
          Path('/tmp/game-check.mjs').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/game-check.mjs

      - name: Commit only finished static game
        run: |
          rm -f apply_static_patch.mjs static-build-debug.txt
          rm -f .github/workflows/static-game-rebuild.yml
          rm -f .github/workflows/debug-static-rebuild.yml
          rm -f .github/workflows/run-static-game-rebuild.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Replace index with complete static jet crash update"
          git pull --rebase origin master
          git push origin master
