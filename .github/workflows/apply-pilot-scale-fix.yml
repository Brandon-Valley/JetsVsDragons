name: Apply pilot scale fix

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.title == 'Apply JetsVsDragons pilot scale fix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Apply scale fix
        run: |
          node --check apply_pilot_scale_fix.mjs
          node apply_pilot_scale_fix.mjs

      - name: Validate game source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script type="module">(.*?)</script>', html, flags=re.S)
          if len(scripts) != 1:
              raise SystemExit(f'Expected one module script, found {len(scripts)}')
          required = [
              'PILOT_SCALE_FIX_V1',
              'const EJECTED_PILOT_HEIGHT = 1.45',
              'const EJECTION_PARACHUTE_SCALE = 1.22',
              'chute.position.y = EJECTION_PARACHUTE_Y',
              'pilotModel.position.set(0, -0.08, -0.06)',
              'BETTER_PILOT_ASSET_V1',
              'Soldier.glb'
          ]
          for value in required:
              if value not in html:
                  raise SystemExit('Missing pilot scale fix: ' + value)
          forbidden = ['3.75 / Math.max(size.y', 'chute.scale.setScalar(0.82)', 'Pilot ejected safely', 'patchGame(', 'fetchBaseGame(', 'gameFrame']
          for value in forbidden:
              if value in html:
                  raise SystemExit('Forbidden old/broken code remains: ' + value)
          Path('/tmp/game-check.mjs').write_text(scripts[0], encoding='utf-8')
          PY
          node --check /tmp/game-check.mjs

      - name: Save fixed HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: jets-vs-dragons-fixed-index
          path: index.html

      - name: Commit finished index directly to master
        run: |
          rm -f apply_pilot_scale_fix.mjs
          rm -f .github/workflows/apply-pilot-scale-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix ejected pilot scale"
          git pull --rebase origin master
          git push origin master
